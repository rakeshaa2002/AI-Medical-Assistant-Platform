name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Django)
    runs-on: ubuntu-latest

    # Real Postgres with pgvector so migrations (CREATE EXTENSION vector) run.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: medassist
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/medassist
      SECRET_KEY: ci-not-a-real-secret
      DEBUG: "True"

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system deps (tesseract for OCR import)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends tesseract-ocr

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check

      - name: Run migrations (validates schema + pgvector)
        run: python manage.py migrate --noinput

      - name: Run tests
        run: python manage.py test --noinput

  frontend:
    name: Frontend (Vite build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
