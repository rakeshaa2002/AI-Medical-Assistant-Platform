# Render Blueprint — provisions the whole stack in one go.
# Docs: https://render.com/docs/blueprint-spec
#
# After the first deploy you must set a few secret/cross-referencing env vars
# (marked `sync: false` below) — see DEPLOY-RENDER.md.

databases:
  - name: medassist-db
    databaseName: medassist
    user: medassist
    plan: free # free Postgres is removed after ~30 days; use `starter` for persistence
    postgresMajorVersion: "16" # pgvector is available; the migration runs CREATE EXTENSION vector

services:
  # ---------------------------------------------------------------- backend --
  - type: web
    name: medassist-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    # Bind gunicorn to the port Render injects (overrides the Dockerfile CMD).
    dockerCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3
    # Run migrations (incl. pgvector extension) before each release.
    preDeployCommand: python manage.py migrate --noinput
    healthCheckPath: /api/docs/
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: medassist-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: PYTHONUNBUFFERED
        value: "1"
      # --- set these yourself in the dashboard (secrets / post-deploy URLs) ---
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false # e.g. https://medassist-frontend.onrender.com
      - key: FRONTEND_URL
        sync: false # e.g. https://medassist-frontend.onrender.com

  # --------------------------------------------------------------- frontend --
  - type: web
    name: medassist-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    # SPA: let React Router handle client-side routes.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false # set to https://medassist-backend.onrender.com/api after backend deploys
